# Google Cloud Build configuration for REMINDRA
# Deploy to Cloud Run from Cloud Build

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remindra:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remindra:latest'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remindra'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/remindra:$SHORT_SHA'
      - '--location=us-central1'
      - '--output=/workspace/output'

  # Actually deploy using gcloud
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'remindra'
      - '--image'
      - 'gcr.io/$PROJECT_ID/remindra:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/remindra:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/remindra:latest'

# Build configuration
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Timeout for build
timeout: '1800s'
